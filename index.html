<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thira ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Poppins;
background:radial-gradient(circle at top,#ff4e8a,#0a000f);
overflow:hidden;
color:white;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:#050008;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

/* DARK GLASS CARD (FIXED CONTRAST) */
.card{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(18px);
padding:28px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,47,109,0.25);
text-align:center;
color:white;
border:1px solid rgba(255,255,255,0.08);
}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transform:scale(1.05);
transition:1s cubic-bezier(.2,.8,.2,1);
pointer-events:none;
}

.page.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* BUTTON */
button{
padding:12px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff2f6d,#ff6fa5);
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px #ff2f6d;
}

/* INPUT FIX (BLACK STYLING) */
input{
padding:12px;
border-radius:12px;
border:none;
outline:none;
text-align:center;
background:rgba(0,0,0,0.6);
color:white;
border:1px solid rgba(255,255,255,0.15);
}

/* WHEEL */
#wheel{
width:260px;
height:260px;
border-radius:50%;
background:conic-gradient(#ff2f6d,#ff6fa5,#ff99c8,#ff2f6d);
transition:4.5s cubic-bezier(.1,.8,.2,1);
box-shadow:0 0 40px rgba(255,47,109,0.4);
}

/* CHAT */
.msg{
background:rgba(255,255,255,0.08);
padding:10px 14px;
margin:6px;
border-radius:14px;
animation:pop 0.4s ease;
color:white;
}

@keyframes pop{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* REELS */
.reel{
height:100vh;
overflow:hidden;
}

.slide{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
border-radius:15px;
animation:zoom 0.3s ease;
}

@keyframes zoom{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}

/* TEXT */
h1{
font-family:"Great Vibes";
font-size:44px;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div style="width:40px;height:40px;background:#ff2f6d;transform:rotate(45deg);"></div>
<p style="margin-top:15px;color:#fff">Loading Love...</p>
</div>

<!-- ENTRY -->
<div id="entry" class="page active">
<div class="card">
<h1>Hey Thira ❤️</h1>
<p>Premium romantic experience</p>
<br>
<button onclick="go('pass')">Enter</button>
</div>
</div>

<!-- PASSWORD -->
<div id="pass" class="page">
<div class="card">
<h2>Our Date?</h2>
<br>
<input id="p" placeholder="Enter code">
<br><br>
<button onclick="check()">Unlock</button>
</div>
</div>

<!-- WHEEL -->
<div id="wheelPage" class="page">
<div class="card">
<h2>Spin Love 🎡</h2>
<br>
<div id="wheel"></div>
<br><br>
<button onclick="spin()">Spin</button>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="card">
<h2>Messages 💬</h2>
<div id="chatbox"></div>
<br>
<button onclick="go('reel')">Next</button>
</div>
</div>

<!-- REELS -->
<div id="reel" class="page">
<div class="reel">

<div class="slide">
<img src="photo1.jpg" width="220" onclick="openImg(this)">
<p>Memory ❤️</p>
</div>

<div class="slide">
<img src="photo2.jpg" width="220" onclick="openImg(this)">
<p>Memory ✨</p>
</div>

<div class="slide">
<img src="photo3.jpg" width="220" onclick="openImg(this)">
<p>Memory 💖</p>
</div>

<div class="slide">
<button onclick="go('final');fire()">Finish 💥</button>
</div>

</div>
</div>

<!-- FINAL -->
<div id="final" class="page">
<h1>Happy Anniversary ❤️</h1>
<p id="typing"></p>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="lightimg">
</div>

<script>

function go(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* PASSWORD */
function check(){
if(document.getElementById("p").value==="23082024"){
go("wheelPage");
}else{
alert("Wrong ❤️");
}
}

/* SPIN */
function spin(){
let deg=1440+Math.random()*360;
document.getElementById("wheel").style.transform="rotate("+deg+"deg)";
setTimeout(()=>{go('chat');chat()},4500);
}

/* CHAT */
function chat(){
let m=["Hi ❤️","Miss you","Always you","Forever us","Love 💖"];
let i=0;
let box=document.getElementById("chatbox");

let t=setInterval(()=>{
if(i>=m.length)clearInterval(t);
let d=document.createElement("div");
d.className="msg";
d.innerText=m[i++];
box.appendChild(d);
},700);
}

/* LIGHTBOX */
function openImg(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=img.src;
}

/* FIREWORK + TYPE */
function fire(){
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.style.position="fixed";
s.style.left="50%";
s.style.top="50%";
s.style.width="4px";
s.style.height="4px";
s.style.background="#fff";
document.body.appendChild(s);

let x=(Math.random()*300-150)+"px";
let y=(Math.random()*300-150)+"px";

s.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x},${y})`,opacity:0}
],{duration:900});

setTimeout(()=>s.remove(),900);
}
type();
}

/* TYPE */
function type(){
let text=`You are my forever ❤️

Everything feels complete with you 🥺

Happy Anniversary 💖`;

let i=0;
let el=document.getElementById("typing");

let t=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(t);
},35);
}

/* LOADER OFF */
setTimeout(()=>document.getElementById("loader").style.display="none",1500);

</script>

</body>
</html>
