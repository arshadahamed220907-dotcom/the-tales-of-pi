<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thangamailu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#000;
color:white;
overflow:hidden;
perspective:1200px;
}

.bg{
position:fixed;
inset:0;
background:radial-gradient(circle at top,#ff4e8a22,#000);
z-index:-1;
}

/* PAGE SYSTEM */
.center,.reel{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

opacity:0;
transform:scale(1.05);
transition:1s ease;
pointer-events:none;
}

.center.active,.reel.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* GLASS */
.card{
background:rgba(20,20,30,0.6);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff2f6d,#ff6fa5);
color:white;
font-weight:600;
cursor:pointer;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:none;
text-align:center;
background:rgba(255,255,255,0.05);
color:white;
}

/* HEARTS */
.heart{
position:absolute;
width:8px;
height:8px;
background:#ff4e8a;
transform:rotate(45deg);
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(110vh) rotate(45deg);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh) rotate(45deg);opacity:0}
}

/* WHEEL */
#wheel{
width:250px;
height:250px;
border-radius:50%;
background:conic-gradient(#ff6fa5,#ff2f6d,#ff99c8,#ff2f6d,#ff6fa5);
transition:transform 5s cubic-bezier(.1,.9,.2,1);
}

/* CHAT (INSTAGRAM STYLE FIXED) */
.chatbox{
display:flex;
flex-direction:column;
gap:8px;
width:100%;
max-width:300px;
}

.msg{
padding:10px 14px;
border-radius:15px;
max-width:80%;
font-size:14px;
}

.me{
align-self:flex-end;
background:#ff2f6d;
}

.her{
align-self:flex-start;
background:rgba(255,255,255,0.1);
}

/* IMAGE FIX */
img{
width:220px;
border-radius:15px;
object-fit:cover;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* POPUP */
#popup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.92);
z-index:999;
}

.popup-card{
background:rgba(20,20,30,0.8);
padding:20px;
border-radius:20px;
text-align:center;
}

.popup-card img{
width:200px;
border-radius:15px;
margin-bottom:10px;
}

h1{
font-family:"Great Vibes";
font-size:44px;
}

</style>
</head>

<body>

<div class="bg"></div>

<audio id="music" loop>
<source src="love.mp3">
</audio>

<script>
window.addEventListener("click",()=>{
document.getElementById("music").play();
});
</script>

<!-- HEARTS -->
<script>
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(h);
}
</script>

<!-- ENTRY -->
<div id="entry" class="center active">
<div class="card">
<h1>En chella pondatti ❤️</h1>
<p>Love you chellam 🥺</p>
<br>
<button onclick="go('pass')">Enter</button>
</div>
</div>

<!-- PASSWORD -->
<div id="pass" class="center">
<div class="card">
<h2>Yeppo first msg 💖</h2>
<input id="p"><br><br>
<button onclick="check()">Open</button>
</div>
</div>

<!-- WHEEL -->
<div id="wheelPage" class="center">
<div class="card">
<h2>Spin 🎡</h2>
<div id="wheel"></div>
<br>
<button onclick="spin()">Spin</button>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="center">
<div class="card">
<h2>Instagram Chat 💬</h2>
<div id="chatbox" class="chatbox"></div>
<br>
<button onclick="go('final');type()">Next ❤️</button>
</div>
</div>

<!-- FINAL -->
<div id="final" class="center">
<h1>Happy Anniversary ❤️</h1>
<p id="typing"></p>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-card">
<img id="popimg">
<p id="poptxt"></p>
<br>
<button onclick="nextSpin()">Spin Again</button>
<button onclick="go('chat');document.getElementById('popup').style.display='none';startChat()">Next</button>
</div>
</div>

<script>

let spinCount=0;

/* PAGE */
function go(id){
document.querySelectorAll('.center').forEach(e=>e.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* PASSWORD */
function check(){
if(document.getElementById('p').value=="23082024"){
go('wheelPage');
}
}

/* SPIN FIXED */
function spin(){
let deg=360*5+Math.random()*360;
document.getElementById("wheel").style.transform="rotate("+deg+"deg)";

setTimeout(showMemory,5000);
}

/* MEMORIES FIXED */
function showMemory(){

let data=[
["photo1.jpg","First date ❤️"],
["photo2.jpg","unga murhgan aa pakka pogum pothu yeduthathu ✨"],
["photo3.jpg","neega alagu unga yepothumae 💖"],
["photo2.jpg","un kuda irukum pothu naa yepothumae santhosama iruken ❤️"],
["photo3.jpg","yepothumae ne kuda iruntha pothum 💞"]
];

document.getElementById("popup").style.display="flex";
document.getElementById("popimg").src=data[spinCount][0];
document.getElementById("poptxt").innerText=data[spinCount][1];

spinCount++;
}

/* NEXT SPIN */
function nextSpin(){
document.getElementById("popup").style.display="none";

if(spinCount<5){
spin();
}else{
document.getElementById("popimg").src="photo1.jpg";
document.getElementById("poptxt").innerText="mudinchiruchu chello ❤️";
}
}

/* INSTAGRAM CHAT FIXED */
function startChat(){
let box=document.getElementById("chatbox");
box.innerHTML="";

let msgs=[
["her","Hi"],
["me","Hi"],
["her","Naa yarunu theriyutha"],
["me","mm"],
["her","lt thana neega"],
["me","mm"]
];

let i=0;

let t=setInterval(()=>{
if(i>=msgs.length)clearInterval(t);

let d=document.createElement("div");
d.className="msg "+(msgs[i][0]=="me"?"me":"her");
d.innerText=msgs[i][1];

box.appendChild(d);
i++;
},800);
}

/* TYPE */
function type(){
let text=`nee ennaku kidachathukku romba happy ❤️

Happy Anniversary 💖`;

let i=0;
let el=document.getElementById("typing");

let t=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(t);
},30);
}

</script>

</body>
</html>
