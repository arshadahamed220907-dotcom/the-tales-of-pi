<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thira ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Poppins;
background:radial-gradient(circle at top,#ff4e8a,#120012);
overflow:hidden;
color:white;
}

/* PRELOADER */
#loader{
position:fixed;
inset:0;
background:#0b000f;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.loader-heart{
width:40px;height:40px;
background:#ff2f6d;
transform:rotate(45deg);
animation:pulse 1s infinite;
}

.loader-heart::before,
.loader-heart::after{
content:'';
position:absolute;
width:40px;height:40px;
background:#ff2f6d;
border-radius:50%;
}

.loader-heart::before{left:-20px}
.loader-heart::after{top:-20px}

@keyframes pulse{
0%{transform:rotate(45deg) scale(1)}
50%{transform:rotate(45deg) scale(1.2)}
100%{transform:rotate(45deg) scale(1)}
}

/* PAGE SYSTEM */
.page{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transform:scale(1.05);
transition:1s cubic-bezier(.2,.8,.2,1);
pointer-events:none;
}

.page.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* GLASS */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:28px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,47,109,0.2);
text-align:center;
}

/* BUTTON */
button{
padding:12px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff2f6d,#ff6fa5);
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px #ff2f6d;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:none;
text-align:center;
}

/* WHEEL */
#wheel{
width:260px;
height:260px;
border-radius:50%;
background:conic-gradient(#ff2f6d,#ff6fa5,#ff99c8,#ff2f6d);
transition:4.5s cubic-bezier(.1,.8,.2,1);
box-shadow:0 0 40px rgba(255,47,109,0.4);
}

/* CHAT */
.msg{
background:rgba(255,255,255,0.1);
padding:10px 14px;
margin:6px;
border-radius:14px;
animation:pop 0.4s ease;
}

@keyframes pop{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* REELS */
.reel{
height:100vh;
overflow:hidden;
}

.slide{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
border-radius:15px;
transform:scale(0.8);
animation:zoom 0.4s forwards;
}

@keyframes zoom{
to{transform:scale(1)}
}

/* HEARTS CANVAS OVERLAY */
canvas{
position:fixed;
inset:0;
pointer-events:none;
}

/* FINAL TEXT */
h1{
font-family:"Great Vibes";
font-size:44px;
}

/* HIDE */
.hidden{display:none}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-heart"></div>
<p style="margin-top:20px">Loading Love...</p>
</div>

<!-- CANVAS PARTICLES -->
<canvas id="c"></canvas>

<!-- MUSIC -->
<audio id="music" loop autoplay>
<source src="love.mp3">
</audio>

<!-- ENTRY -->
<div id="entry" class="page active">
<div class="card">
<h1>Hey Thira ❤️</h1>
<p>A premium love experience</p>
<br>
<button onclick="go('pass')">Enter</button>
</div>
</div>

<!-- PASS -->
<div id="pass" class="page">
<div class="card">
<h2>Our Date?</h2>
<br>
<input id="p">
<br><br>
<button onclick="check()">Unlock</button>
</div>
</div>

<!-- WHEEL -->
<div id="wheelPage" class="page">
<div class="card">
<h2>Spin Love 🎡</h2>
<br>
<div id="wheel"></div>
<br><br>
<button onclick="spin()">Spin</button>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="card">
<h2>Messages 💬</h2>
<div id="chatbox"></div>
<br>
<button onclick="go('reel')">Next</button>
</div>
</div>

<!-- REELS -->
<div id="reel" class="page">
<div class="reel">

<div class="slide">
<img src="photo1.jpg" width="220" onclick="openImg(this)">
<p>Memory 1 ❤️</p>
</div>

<div class="slide">
<img src="photo2.jpg" width="220" onclick="openImg(this)">
<p>Memory 2 ✨</p>
</div>

<div class="slide">
<img src="photo3.jpg" width="220" onclick="openImg(this)">
<p>Memory 3 💖</p>
</div>

<div class="slide">
<button onclick="go('final');explode()">Finish 💥</button>
</div>

</div>
</div>

<!-- FINAL -->
<div id="final" class="page">
<h1>Happy Anniversary ❤️</h1>
<p id="typing"></p>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="lightimg">
</div>

<script>

/* LOADER */
window.onload=()=>{
 setTimeout(()=>document.getElementById("loader").style.display="none",1500);
}

/* PAGE */
function go(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* PASSWORD */
function check(){
 if(document.getElementById("p").value==="23082024"){
  go("wheelPage");
 }else alert("Wrong ❤️");
}

/* SPIN */
function spin(){
 let deg=1440+Math.random()*360;
 document.getElementById("wheel").style.transform="rotate("+deg+"deg)";
 setTimeout(()=>{go('chat');chat()},4500);
}

/* CHAT */
function chat(){
 let m=["Hi ❤️","Miss you","Nee en life ❤️","Always us","Forever 💖"];
 let i=0;
 let box=document.getElementById("chatbox");
 let t=setInterval(()=>{
  if(i>=m.length)clearInterval(t);
  let d=document.createElement("div");
  d.className="msg";
  d.innerText=m[i++];
  box.appendChild(d);
 },700);
}

/* LIGHTBOX */
function openImg(img){
 document.getElementById("lightbox").style.display="flex";
 document.getElementById("lightimg").src=img.src;
}

/* TYPE */
function explode(){
 for(let i=0;i<70;i++){
  let s=document.createElement("div");
  s.style.position="fixed";
  s.style.left="50%";
  s.style.top="50%";
  s.style.width="4px";
  s.style.height="4px";
  s.style.background="#fff";
  s.style.borderRadius="50%";
  document.body.appendChild(s);

  let x=(Math.random()*300-150)+"px";
  let y=(Math.random()*300-150)+"px";

  s.animate([
   {transform:"translate(0,0)",opacity:1},
   {transform:`translate(${x},${y})`,opacity:0}
  ],{duration:900});

  setTimeout(()=>s.remove(),900);
 }
 type();
}

/* TYPING */
function type(){
 let text=`You are my forever ❤️

Every moment feels magical ✨

Thank you for everything 🥺

Happy Anniversary 💖`;

 let i=0;
 let el=document.getElementById("typing");

 let t=setInterval(()=>{
  el.innerHTML+=text[i];
  i++;
  if(i>=text.length)clearInterval(t);
 },35);
}

/* PARTICLES */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let hearts=[];

for(let i=0;i<80;i++){
 hearts.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2+1,
  s:Math.random()*1+0.5
 });
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 hearts.forEach(h=>{
  ctx.fillStyle="rgba(255,80,150,0.6)";
  ctx.beginPath();
  ctx.arc(h.x,h.y,h.r,0,Math.PI*2);
  ctx.fill();

  h.y-=h.s;
  if(h.y<0)h.y=canvas.height;
 });
 requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
