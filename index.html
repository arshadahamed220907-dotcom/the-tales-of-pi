<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thangamailu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#000;
color:white;
overflow:hidden;
perspective:1200px;
}

/* CINEMATIC BACKGROUND LAYERS */
.bg{
position:fixed;
inset:0;
background:radial-gradient(circle at top,#ff4e8a22,#000);
z-index:-2;
}

/* 3D CAMERA SYSTEM */
.center,.reel{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

opacity:0;
transform:translateZ(-100px) scale(1.1);
filter:blur(10px);

transition:1.2s cubic-bezier(.2,.8,.2,1);
pointer-events:none;
}

.center.active,.reel.active{
opacity:1;
transform:translateZ(0) scale(1);
filter:blur(0px);
pointer-events:auto;
}

/* APPLE GLASS */
.card{
background:rgba(20,20,30,0.55);
backdrop-filter:blur(25px);
padding:26px;
border-radius:26px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff2f6d,#ff6fa5);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px) scale(1.03);
box-shadow:0 20px 40px rgba(255,47,109,0.3);
}

/* INPUT */
input{
padding:10px;
border-radius:12px;
border:none;
text-align:center;
background:rgba(255,255,255,0.05);
color:white;
outline:none;
border:1px solid rgba(255,255,255,0.1);
}

/* HEARTS */
.heart{
position:absolute;
width:8px;
height:8px;
background:#ff4e8a;
transform:rotate(45deg);
animation:float 10s linear infinite;
opacity:0.5;
}

@keyframes float{
0%{transform:translateY(110vh) rotate(45deg);opacity:0}
50%{opacity:0.8}
100%{transform:translateY(-10vh) rotate(45deg);opacity:0}
}

/* WHEEL */
#wheel{
width:250px;
height:250px;
border-radius:50%;
background:conic-gradient(#ff6fa5,#ff2f6d,#ff99c8,#ff2f6d,#ff6fa5);
box-shadow:0 0 60px rgba(255,47,109,0.25);
transition:transform 5.5s cubic-bezier(.1,.9,.2,1);
}

/* CHAT */
.msg{
background:rgba(255,255,255,0.07);
padding:10px 14px;
margin:6px;
border-radius:14px;
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* REELS */
.reel{
overflow:hidden;
transform-style:preserve-3d;
}

.slide{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
transform:translateZ(50px);
}

/* IMAGE */
img{
width:220px;
border-radius:16px;
object-fit:cover;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
transition:0.4s;
}

img:hover{
transform:scale(1.03);
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
border-radius:18px;
animation:zoom 0.4s ease;
}

@keyframes zoom{
from{transform:scale(0.8)}
to{transform:scale(1)}
}

h1{
font-family:"Great Vibes";
font-size:44px;
}

/* SCROLL CAMERA EFFECT */
.scrollLayer{
transform:translateZ(0);
transition:transform 0.2s ease;
}

</style>
</head>

<body>

<div class="bg"></div>

<audio id="music" loop>
<source src="love.mp3">
</audio>

<script>
/* FIX MUSIC AUTOPLAY */
window.addEventListener("click",()=>{
document.getElementById("music").play();
});
</script>

<!-- HEARTS -->
<script>
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(h);
}
</script>

<!-- ENTRY -->
<div id="entry" class="center active">
<div class="card">
<h1>En chella pondatti ❤️</h1>
<p>Love you chellamailu Parunga nalla irukum  🥺</p>
<br>
<button onclick="go('pass')">Ulla polama</button>
</div>
</div>

<!-- PASSWORD -->
<div id="pass" class="center">
<div class="card">
<h2>Yeppo neega engaluku first msg panninga 💖</h2>
<br>
<input id="p">
<br><br>
<button onclick="check()">Thoranthuru seesae</button>
</div>
</div>

<!-- WHEEL -->
<div id="wheelPage" class="center">
<div class="card">
<h2>Spin Pannu di thangamailu 🎡</h2>
<br>
<div id="wheel"></div>
<br><br>
<button onclick="spin()">Spin</button>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="center">
<div class="card">
<h2>Nayabagam iruka 💬</h2>
<div id="chatbox"></div>
<br>
<button onclick="go('reel')">Aduthu polama ❤️</button>
</div>
</div>

<!-- REELS -->
<div id="reel" class="reel">

<div class="slide">
<img src="photo1.jpg">
<p>Our first date ❤️</p>
</div>

<div class="slide">
<img src="photo2.jpg">
<p>Un kooda irukum pothu happy aa iruken ✨</p>
</div>

<div class="slide">
<img src="photo3.jpg">
<p>Neega than engaluku yellamae 💖</p>
</div>

<div class="slide">
<button onclick="go('final');fire()">Finally 💥</button>
</div>

</div>

<!-- FINAL -->
<div id="final" class="center">
<h1>Happy Anniversary en chellapondattti ❤️</h1>
<p id="typing"></p>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="lightimg">
</div>

<script>

/* PAGE SWITCH */
function go(id){
document.querySelectorAll('.center,.reel').forEach(e=>e.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* PASSWORD */
function check(){
if(document.getElementById('p').value=="23082024"){
go('wheelPage');
}
}

/* 🎡 5 FULL SPINS FIX */
function spin(){
let fullSpins = 360 * 5;
let extra = Math.random()*360;
let deg = fullSpins + extra;

document.getElementById('wheel').style.transform="rotate("+deg+"deg)";

setTimeout(()=>{go('chat');chat()},5200);
}

/* CHAT */
function chat(){
let msgs=["Hi "," Hi ","Naa Yarunu Theriyutha ","Mm ","Lt thana neega "];
let i=0;
let box=document.getElementById("chatbox");

let t=setInterval(()=>{
if(i>=msgs.length)clearInterval(t);
let d=document.createElement("div");
d.className="msg";
d.innerText=msgs[i++];
box.appendChild(d);
},700);
}

/* LIGHTBOX */
document.querySelectorAll("img").forEach(img=>{
img.onclick=()=>{
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=img.src;
}
});

/* FIREWORK */
function fire(){
for(let i=0;i<70;i++){
let f=document.createElement("div");
f.style.position="fixed";
f.style.left="50%";
f.style.top="50%";
f.style.width="4px";
f.style.height="4px";
f.style.background="#fff";
document.body.appendChild(f);

let x=(Math.random()*300-150)+"px";
let y=(Math.random()*300-150)+"px";

f.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x},${y})`,opacity:0}
],{duration:900});

setTimeout(()=>f.remove(),900);
}
type();
}

/* TYPE */
function type(){
let text=`nee ennaku kidachathukku romba happy aa feel panren...thangamaailu nee than ennaku yellame un kooda irukum pothu naa romba happy aa iruken.. thanks for being with me.. love you en pondatti

Happy Anniversary bbykuttyan 💖`;

let i=0;
let el=document.getElementById("typing");

let t=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(t);
},35);
}

/* SIMPLE SCROLL CAMERA FEEL */
document.addEventListener("mousemove",(e)=>{
let x=(e.clientX/window.innerWidth-0.5)*10;
let y=(e.clientY/window.innerHeight-0.5)*10;
document.body.style.transform=`rotateX(${y}deg) rotateY(${x}deg)`;
});

</script>

</body>
</html>
