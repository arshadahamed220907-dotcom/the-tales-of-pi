<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thira ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL APPLE-LIKE BASE */
body{
margin:0;
font-family:Poppins;
background:#000;
color:white;
overflow:hidden;
}

/* CINEMATIC BACKGROUND LAYER */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at top,#ff4e8a33,#000);
z-index:-1;
}

/* APPLE STYLE PAGE ENGINE */
.center,.reel{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

opacity:0;
transform:translateY(30px) scale(1.02);
filter:blur(8px);

transition:
opacity 1s cubic-bezier(.2,.8,.2,1),
transform 1s cubic-bezier(.2,.8,.2,1),
filter 1s cubic-bezier(.2,.8,.2,1);

pointer-events:none;
}

.center.active,.reel.active{
opacity:1;
transform:translateY(0) scale(1);
filter:blur(0px);
pointer-events:auto;
}

/* PREMIUM GLASS (APPLE MATERIAL STYLE) */
.card{
background:rgba(20,20,30,0.55);
backdrop-filter:blur(25px);
padding:26px;
border-radius:26px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:
0 30px 80px rgba(0,0,0,0.6),
inset 0 1px 0 rgba(255,255,255,0.05);
}

/* BUTTON (SOFT APPLE MOTION) */
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff2f6d,#ff6fa5);
color:white;
font-weight:600;
cursor:pointer;
transition:all 0.35s ease;
}

button:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 20px 40px rgba(255,47,109,0.25);
}

/* INPUT (DARK PREMIUM) */
input{
padding:10px;
border-radius:12px;
border:none;
text-align:center;
background:rgba(255,255,255,0.05);
color:white;
outline:none;
border:1px solid rgba(255,255,255,0.1);
}

/* HEARTS (SOFT FLOAT LIKE APPLE BACKGROUND MOTION) */
.heart{
position:absolute;
width:8px;
height:8px;
background:#ff4e8a;
transform:rotate(45deg);
animation:float 10s linear infinite;
opacity:0.5;
}

@keyframes float{
0%{transform:translateY(110vh) rotate(45deg);opacity:0}
40%{opacity:0.8}
100%{transform:translateY(-10vh) rotate(45deg);opacity:0}
}

/* WHEEL (SMOOTH INERTIA FEEL) */
#wheel{
width:250px;
height:250px;
border-radius:50%;
background:conic-gradient(#ff6fa5,#ff2f6d,#ff99c8,#ff2f6d,#ff6fa5);
box-shadow:0 0 60px rgba(255,47,109,0.25);
transition:transform 5s cubic-bezier(.1,.9,.2,1);
}

/* CHAT (SOFT FADE LIKE IOS MESSAGES) */
.msg{
background:rgba(255,255,255,0.07);
padding:10px 14px;
margin:6px;
border-radius:14px;
animation:msg 0.6s ease;
}

@keyframes msg{
from{opacity:0;transform:translateY(12px)}
to{opacity:1;transform:translateY(0)}
}

/* REELS */
.reel{
overflow:hidden;
}

.slide{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

/* IMAGE — FIXED VISIBILITY ONLY (NO CHANGE TO NAME) */
img{
width:220px;
border-radius:16px;
object-fit:cover;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
transform:scale(1);
transition:0.4s ease;
}

img:hover{
transform:scale(1.03);
}

/* LIGHTBOX (APPLE ZOOM FEEL) */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
border-radius:18px;
animation:zoom 0.4s ease;
}

@keyframes zoom{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}

/* TYPOGRAPHY */
h1{
font-family:"Great Vibes";
font-size:44px;
letter-spacing:1px;
}

/* SMOOTH SCROLL FEEL ON SWITCH */
.hidden{display:none}

</style>
</head>

<body>

<audio id="music" autoplay loop>
<source src="love.mp3">
</audio>

<!-- HEARTS -->
<script>
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(h);
}
</script>

<!-- ENTRY -->
<div id="entry" class="center active">
<div class="card">
<h1>Hey Thira ❤️</h1>
<p>I made something for you 🥺</p>
<br>
<button onclick="go('pass')">Enter</button>
</div>
</div>

<!-- PASSWORD -->
<div id="pass" class="center">
<div class="card">
<h2>When did our story begin? 💖</h2>
<br>
<input id="p">
<br><br>
<button onclick="check()">Unlock</button>
</div>
</div>

<!-- WHEEL -->
<div id="wheelPage" class="center">
<div class="card">
<h2>Spin our love 🎡</h2>
<br>
<div id="wheel"></div>
<br><br>
<button onclick="spin()">Spin</button>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="center">
<div class="card">
<h2>Our Chat 💬</h2>
<div id="chatbox"></div>
<br>
<button onclick="go('reel')">Next ❤️</button>
</div>
</div>

<!-- REELS -->
<div id="reel" class="reel">

<div class="slide">
<img src="photo1.jpg" onclick="openImg(this)">
<p>Our first smile ❤️</p>
</div>

<div class="slide">
<img src="photo2.jpg" onclick="openImg(this)">
<p>Un kooda irukum pothu happy ✨</p>
</div>

<div class="slide">
<img src="photo3.jpg" onclick="openImg(this)">
<p>You are my everything 💖</p>
</div>

<div class="slide">
<button onclick="go('final');fire()">Final Surprise 💥</button>
</div>

</div>

<!-- FINAL -->
<div id="final" class="center">
<h1>Happy Anniversary Thira ❤️</h1>
<p id="typing"></p>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="lightimg">
</div>

<script>

/* APPLE SMOOTH PAGE SWITCH */
function go(id){
document.querySelectorAll('.center,.reel').forEach(e=>{
e.classList.remove('active');
});
document.getElementById(id).classList.add('active');
}

/* PASSWORD */
function check(){
if(document.getElementById('p').value=="23082024"){
go('wheelPage');
}
}

/* WHEEL */
function spin(){
let deg=1440+Math.random()*360;
document.getElementById('wheel').style.transform="rotate("+deg+"deg)";
setTimeout(()=>{go('chat');chat()},4800);
}

/* CHAT */
function chat(){
let msgs=["Hi ❤️","Naa iruken","Nee than everything 🥺","Forever us 💖","Love you"];
let i=0;
let box=document.getElementById("chatbox");

let t=setInterval(()=>{
if(i>=msgs.length)clearInterval(t);
let d=document.createElement("div");
d.className="msg";
d.innerText=msgs[i++];
box.appendChild(d);
},650);
}

/* LIGHTBOX */
function openImg(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=img.src;
}

/* FIRE + TYPE */
function fire(){
for(let i=0;i<60;i++){
let f=document.createElement("div");
f.style.position="fixed";
f.style.left="50%";
f.style.top="50%";
f.style.width="4px";
f.style.height="4px";
f.style.background="#fff";
document.body.appendChild(f);

let x=(Math.random()*300-150)+"px";
let y=(Math.random()*300-150)+"px";

f.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x},${y})`,opacity:0}
],{duration:900});

setTimeout(()=>f.remove(),900);
}
type();
}

/* TYPE */
function type(){
let text=`You are my forever ❤️

Happy Anniversary 💖`;

let i=0;
let el=document.getElementById("typing");

let t=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(t);
},35);
}

</script>

</body>
</html>
